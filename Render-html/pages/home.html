<!DOCTYPE html>
<html>
<head>
    <title>Home Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        nav {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav .nav-links a:hover {
            color: #00bcd4;
        }

        nav .login-link a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 8px 15px;
            border: 1px solid white;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav .login-link a:hover {
            background-color: white;
            color: #0d47a1;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #2196f3, #0d47a1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: white;
            color: #0d47a1;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background-color: #ddd;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <div></div>
        <!-- Left navigation links -->
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>

        <!-- Login link at top-right -->
        <div class="login-link">
            <a href="/login">Login</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>This is a simple homepage using HTML and CSS.</p>
        <button>Learn More</button>
    </section>

    <footer>
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
