<!DOCTYPE html>
<html>
<head>
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        .container h1 {
            font-size: 120px;
            margin-bottom: 10px;
        }

        .container h2 {
            font-size: 30px;
            margin-bottom: 20px;
        }

        .container p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .container a {
            text-decoration: none;
            padding: 12px 25px;
            background-color: white;
            color: #2a5298;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .container a:hover {
            background-color: #ddd;
        }

        /* Simple animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .container h1 {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed or does not exist.</p>
        <a href="/">Go Back Home</a>
    </div>

</body>
</html>
