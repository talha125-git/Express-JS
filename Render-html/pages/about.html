<!DOCTYPE html>
<html>
<head>
    <title>About Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* Navbar */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: #2196f3;
        }

        /* About Section */
        .about-section {
            padding: 60px 20px;
            text-align: center;
        }

        .about-section h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .about-section p {
            max-width: 700px;
            margin: 0 auto 20px auto;
            font-size: 18px;
            line-height: 1.6;
            color: #555;
        }

    
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>

    <section class="about-section">
        <h1>About Us</h1>
        <p>
            Welcome to our website! We are passionate about building beautiful and
            responsive websites using HTML and CSS. Our goal is to create clean,
            simple, and user-friendly designs.
        </p>
        <p>
            This page is created as a simple example of an About page layout.
        </p>
    </section>



    

</body>
</html>
