<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* Navbar */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        nav a:hover {
            color: #2196f3;
        }

        /* Contact Section */
        .contact-section {
            padding: 60px 20px;
            text-align: center;
        }

        .contact-section h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .contact-section p {
            font-size: 18px;
            color: #555;
            margin-bottom: 40px;
        }

        /* Contact Form */
        .contact-form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .contact-form .input-box {
            margin-bottom: 20px;
            text-align: left;
        }

        .contact-form label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .contact-form button {
            width: 100%;
            padding: 10px;
            background-color: #0d47a1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .contact-form button:hover {
            background-color: #1565c0;
        }

    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/login">login</a>
        <a href="/contact">Contact</a>
    </nav>

    <section class="contact-section">
        <h1>Contact Us</h1>
        <p>Have questions? Fill out the form below and we'll get back to you as soon as possible.</p>

        <div class="contact-form">
            <form>
                <div class="input-box">
                    <label>Name</label>
                    <input type="text" placeholder="Your name" required>
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="Your email" required>
                </div>

                <div class="input-box">
                    <label>Message</label>
                    <textarea placeholder="Your message" required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>


</body>
</html>
